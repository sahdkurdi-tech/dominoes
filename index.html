<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOMINO PLUS</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" href="icon-192.png" type="image/png"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css?v=1.0">
    <link rel="stylesheet" media="screen and (max-width: 768px)" href="mobile.css?v=1.0">
</head>
<body>
    <div class="container">

        <div class="top-bar">
            <button id="muteBtn" onclick="toggleMute()" class="icon-btn" title="بێدەنگکردن">
                <i class="fas fa-volume-up"></i>
            </button>
        </div>
        
        <div class="add-players">
            <button onclick="addPlayers(2)">
                <i class="fas fa-user-friends"></i> 2 یاریزان
            </button>
            <button onclick="addPlayers(3)">
                <i class="fas fa-users"></i> 3 یاریزان
            </button>
            <button onclick="addPlayers(4)">
                <i class="fas fa-users-cog"></i> 4 یاریزان
            </button>
            
            <button onclick="window.location.href='archive.html'" style="color: #d4af37; border-color: #d4af37; background: rgba(212, 175, 55, 0.08);">
                <i class="fas fa-history"></i> ئەرشیف
            </button>

            <div class="update-app-container">
    <button onclick="forceUpdateApp()" class="update-btn" title="هێنانی نوێترین ڤێرژن">
        <i class="fas fa-cloud-download-alt"></i> نوێکردنەوەی ئەپ
    </button>
</div>
        </div>

        <div id="players" class="players-grid"></div>

        <div class="controls hidden" id="gameControls">
            <button class="finish" onclick="finishGame()">
                <i class="fas fa-flag-checkered"></i> یارییەکە تەواو
            </button>
            <button class="reset" onclick="resetGame()">
                <i class="fas fa-sync-alt"></i> نوێ کردنەوە
            </button>
        </div>

        <div id="finalResults" class="final-results hidden"></div>
    </div>

    <div id="finishModal" class="custom-modal hidden">
        <div class="custom-modal-content">
            <i class="fas fa-exclamation-circle warning-icon"></i>
            <h2>کۆتاییپێهێنانی یاری</h2>
            <p>دڵنیایت دەتەوێت کۆتایی بەم یارییە بهێنیت و ئەنجامەکان خەزن بکەیت لە ئەرشیف؟</p>
            <div class="modal-actions">
                <button class="btn-confirm" onclick="confirmFinishGame()">بەڵێ، یارییەکە تەواو</button>
                <button class="btn-cancel" onclick="closeFinishModal()">نەخێر، با بەردەوام بین</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="firebase-init.js"></script>

    <script src="script.js?v=1.0"></script>
</body>
</html>
