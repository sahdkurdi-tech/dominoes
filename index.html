<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خوێندنەوەی دۆمینە</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" media="screen and (max-width: 768px)" href="mobile.css">
</head>
<body>
    <div class="container">
        
        <div class="add-players">
            <button onclick="addPlayers(2)">
                <i class="fas fa-user-friends"></i> 2 یاریزان
            </button>
            <button onclick="addPlayers(3)">
                <i class="fas fa-users"></i> 3 یاریزان
            </button>
            <button onclick="addPlayers(4)">
                <i class="fas fa-users-cog"></i> 4 یاریزان
            </button>
        </div>

        <div id="players" class="players-grid"></div>

        <div class="controls hidden" id="gameControls">
            <button class="finish" onclick="finishGame()">
                <i class="fas fa-flag-checkered"></i> یارییەکە تەواو
            </button>
            <button class="reset" onclick="resetGame()">
                <i class="fas fa-sync-alt"></i> نوێ کردنەوە
            </button>
        </div>

        <div id="finalResults" class="final-results hidden"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/nosleep/0.12.0/NoSleep.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
